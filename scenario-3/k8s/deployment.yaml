apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: scenario-3
  labels:
    app: inference-api
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      containers:
        - name: inference-api
          image: inference-api:v1.2.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: inference-api-config
                  key: DB_CONNECTION_STRING
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: inference-api-config
                  key: APP_VERSION
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: inference-api-config
                  key: ENVIRONMENT
          envFrom:
            - secretRef:
                name: inference-api-secrets
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "10m"
              memory: "32Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: scenario-3
spec:
  selector:
    app: inferenceapi
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
